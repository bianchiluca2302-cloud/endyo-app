[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Aggiunge backend/ e backend/tests/ a sys.path
# backend/ → trova conftest, main, ai_service, ecc.
# tests/   → trova helpers.py
pythonpath = . tests

# Output leggibile
addopts =
    -v
    --tb=short
    --no-header
    -p no:warnings
